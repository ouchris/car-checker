<!DOCTYPE html>
<html>
<head>
  <title>Car Comp Finder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f3f6fb;
      color: #071426;
    }

    .hero {
      background: linear-gradient(135deg, #0b1220, #14213d);
      color: white;
      padding: 42px 20px 90px;
      text-align: center;
    }

    .hero h1 {
      font-size: 42px;
      margin: 0;
    }

    .hero p {
      color: #cbd5e1;
      margin-top: 10px;
      font-size: 17px;
    }

    .container {
      max-width: 1100px;
      margin: -64px auto 40px;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 16px 40px rgba(15,23,42,.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 14px;
    }

    input, select {
      width: 100%;
      padding: 15px;
      border: 1px solid #d8e0ea;
      border-radius: 14px;
      font-size: 15px;
      background: #f8fafc;
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .muted {
      color: #64748b;
      font-weight: 600;
    }

    .comp {
      border-top: 1px solid #e5e7eb;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 20px;
    }

    .comp:first-child {
      border-top: none;
    }

    .comp img {
      width: 160px;
      height: 120px;
      object-fit: cover;
      border-radius: 14px;
      background: #e5e7eb;
    }

    .comp-title {
      font-size: 20px;
      font-weight: 900;
    }

    .price {
      font-size: 28px;
      font-weight: 900;
      margin: 8px 0;
    }

    .details {
      color: #475569;
      line-height: 1.7;
      font-weight: 600;
    }

    a {
      color: #2563eb;
      font-weight: 900;
    }

    @media(max-width:800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .comp {
        grid-template-columns: 1fr;
      }

      .comp img {
        width: 100%;
        height: 220px;
      }

      .hero h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Car Comp Finder</h1>
  <p>Search nearby comparable listings instantly.</p>
</div>

<div class="container">

  <div class="card">

    <div class="grid">

      <select id="year" onchange="loadMakes()">
        <option value="">Select Year</option>
      </select>

      <select id="make" onchange="loadModels()" disabled>
        <option value="">Select Make</option>
      </select>

      <select id="model" disabled>
        <option value="">Select Model</option>
      </select>

      <input id="zip" placeholder="ZIP code">

      <select id="radius">
        <option value="25">25 miles</option>
        <option value="50">50 miles</option>
        <option value="75" selected>75 miles</option>
        <option value="100">100 miles</option>
        <option value="200">200 miles</option>
      </select>

      <select id="sort">
        <option value="price-low">Lowest Price</option>
        <option value="price-high">Highest Price</option>
        <option value="mileage-low">Lowest Mileage</option>
        <option value="distance">Closest Distance</option>
      </select>

    </div>

    <button onclick="runSearch()">
      Run Live Market Comps
    </button>

  </div>

  <div id="results"></div>

</div>

<script>

let latestData = [];

async function loadYears() {
  const res = await fetch('/api/years');
  const data = await res.json();

  const year = document.getElementById('year');

  data.years.forEach(y => {
    const opt = document.createElement('option');

    opt.value = y;
    opt.textContent = y;

    year.appendChild(opt);
  });
}

async function loadMakes() {

  const year = document.getElementById('year').value;

  const make = document.getElementById('make');
  const model = document.getElementById('model');

  make.innerHTML = '<option>Loading...</option>';

  const res = await fetch(`/api/makes?year=${year}`);
  const data = await res.json();

  make.innerHTML = '<option value="">Select Make</option>';

  data.makes.forEach(m => {
    const opt = document.createElement('option');

    opt.value = m;
    opt.textContent = m;

    make.appendChild(opt);
  });

  make.disabled = false;

  model.innerHTML = '<option value="">Select Model</option>';
  model.disabled = true;
}

async function loadModels() {

  const year = document.getElementById('year').value;
  const make = document.getElementById('make').value;

  const model = document.getElementById('model');

  model.innerHTML = '<option>Loading...</option>';

  const res = await fetch(
    `/api/models?year=${year}&make=${encodeURIComponent(make)}`
  );

  const data = await res.json();

  model.innerHTML = '<option value="">Select Model</option>';

  data.models.forEach(m => {
    const opt = document.createElement('option');

    opt.value = m;
    opt.textContent = m;

    model.appendChild(opt);
  });

  model.disabled = false;
}

window.onload = loadYears;

function sortComps(comps) {

  const sort = document.getElementById('sort').value;

  const sorted = [...comps];

  if (sort === 'price-low') {
    sorted.sort((a,b) => a.price - b.price);
  }

  if (sort === 'price-high') {
    sorted.sort((a,b) => b.price - a.price);
  }

  if (sort === 'mileage-low') {
    sorted.sort((a,b) => (a.miles || 9999999) - (b.miles || 9999999));
  }

  if (sort === 'distance') {
    sorted.sort((a,b) => a.dist - b.dist);
  }

  return sorted;
}

function renderComps() {

  const results = document.getElementById('results');

  const comps = sortComps(latestData);

  results.innerHTML = `
    <div class="card">

      <h2 class="section-title">
        Comparable Listings
      </h2>

      <p class="muted">
        ${comps.length} listings found.
      </p>

      ${comps.map(car => `
        <div class="comp">

          <div>
            ${
              car.image
                ? `<img src="${car.image}">`
                : `<img>`
            }
          </div>

          <div>

            <div class="comp-title">
              ${car.year} ${car.make} ${car.model} ${car.trim || ''}
            </div>

            <div class="price">
              $${Number(car.price).toLocaleString()}
            </div>

            <div class="details">

              Mileage:
              ${
                car.miles
                  ? Number(car.miles).toLocaleString()
                  : 'N/A'
              }
              miles
              <br>

              Distance:
              ${car.dist} miles away
              <br>

              Dealer:
              ${car.dealerName}
              <br>

              Location:
              ${car.city}, ${car.state}

            </div>

            ${
              car.link
                ? `<p><a href="${car.link}" target="_blank">View Listing</a></p>`
                : ''
            }

          </div>

        </div>
      `).join('')}

    </div>
  `;
}

async function runSearch() {

  const results = document.getElementById('results');

  const payload = {
    year: document.getElementById('year').value,
    make: document.getElementById('make').value,
    model: document.getElementById('model').value,
    zip: document.getElementById('zip').value,
    radius: document.getElementById('radius').value
  };

  if (!payload.year || !payload.make || !payload.model || !payload.zip) {

    results.innerHTML = `
      <div class="card">
        Please complete all fields.
      </div>
    `;

    return;
  }

  results.innerHTML = `
    <div class="card">
      Loading comparable listings...
    </div>
  `;

  const res = await fetch('/api/live-comps', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.error) {

    results.innerHTML = `
      <div class="card">
        ${data.error}
      </div>
    `;

    return;
  }

  latestData = data.comps;

  renderComps();
}

document.addEventListener('change', e => {
  if (e.target.id === 'sort') {
    renderComps();
  }
});

</script>

</body>
</html>
